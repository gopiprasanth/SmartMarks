<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartMarks Options</title>
    <link rel="stylesheet" href="styles/options.css">
    <link rel="stylesheet" href="styles/shared.css">
</head>
<body>
    <div class="options-container">
        <header class="options-header">
            <img src="icons/icon48.png" alt="SmartMarks Logo" class="logo">
            <h1>SmartMarks Options</h1>
        </header>

        <div class="options-content">
            <section class="option-section">
                <h2>Display Settings</h2>
                <div class="option-item">
                    <label for="default-view">Default View</label>
                    <select id="default-view">
                        <option value="list">List View</option>
                        <option value="grid">Grid View</option>
                    </select>
                </div>
                <div class="option-item">
                    <label for="show-favicons">Show Favicons</label>
                    <input type="checkbox" id="show-favicons" checked>
                </div>
            </section>

            <section class="option-section">
                <h2>Smart Suggestions</h2>
                <div class="option-item">
                    <label for="ask-folder-before-save">Show folder suggestion modal</label>
                    <input type="checkbox" id="ask-folder-before-save" checked>
                </div>
                <div class="option-item">
                    <label for="auto-create-folders">Auto-create intelligent folder when no suggestion exists</label>
                    <input type="checkbox" id="auto-create-folders">
                </div>
            </section>


            <section class="option-section">
                <h2>Categorization Engine</h2>
                <div class="option-item">
                    <label for="categorization-version">Categorization mode</label>
                    <select id="categorization-version">
                        <option value="v1">Version 1 (rule-based default)</option>
                        <option value="v2">Version 2 (LLM-assisted)</option>
                    </select>
                </div>
                <div class="option-item">
                    <label for="llm-enabled">Enable LLM smart categorization</label>
                    <input type="checkbox" id="llm-enabled">
                </div>
                <div class="option-item">
                    <label for="llm-provider">LLM provider</label>
                    <select id="llm-provider">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Claude (Anthropic)</option>
                        <option value="gemini">Gemini</option>
                        <option value="openai-compatible">OpenAI-compatible (Llama/Ollama/local/remote)</option>
                    </select>
                </div>
                <div class="option-item">
                    <label for="llm-model">Model name</label>
                    <input id="llm-model" type="text" placeholder="gpt-4o-mini / claude-3-5-sonnet / gemini-1.5-flash / llama3.1">
                </div>
                <div class="option-item">
                    <label for="llm-api-key">API key</label>
                    <input id="llm-api-key" type="password" placeholder="Provider API key (not required for some local models)">
                </div>
                <div class="option-item">
                    <label for="llm-base-url">Base URL (optional)</label>
                    <input id="llm-base-url" type="text" placeholder="https://api.openai.com/v1 or http://localhost:11434/v1">
                </div>
                <div class="option-item">
                    <label for="llm-temperature">Temperature (0 - 1)</label>
                    <input id="llm-temperature" type="number" min="0" max="1" step="0.1">
                </div>
            </section>

            <section class="option-section">
                <h2>Data Management</h2>
                <div class="option-item">
                    <button id="export-btn" class="secondary-btn">Export Bookmarks</button>
                    <button id="import-btn" class="secondary-btn">Import Bookmarks</button>
                </div>
                <div class="option-item">
                    <button id="clear-data-btn" class="danger-btn">Clear All Data</button>
                </div>
            </section>
        </div>

        <footer class="options-footer">
            <button id="save-btn" class="primary-btn">Save Changes</button>
        </footer>
    </div>

    <script src="scripts/options.js"></script>
</body>
</html>
